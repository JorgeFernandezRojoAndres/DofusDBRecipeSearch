<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <!-- Google Fonts -->

    @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 700; font-display: swap; src: url(https://fonts.gstatic.com/s/cinzel/v26/8vIU7ww63mVu7gtR-kwKxNvkNOjw-jHgTYo.ttf) format('truetype'); }
    @font-face { font-family: 'Hanken Grotesk'; font-style: normal; font-weight: 400; font-display: swap; src: url(https://fonts.gstatic.com/s/hankengrotesk/v12/ieVq2YZDLWuGJpnzaiwFXS9tYvBRzyFLlZg_f_Ncs2Za4Q.ttf) format('truetype'); }
    @font-face { font-family: 'Hanken Grotesk'; font-style: normal; font-weight: 500; font-display: swap; src: url(https://fonts.gstatic.com/s/hankengrotesk/v12/ieVq2YZDLWuGJpnzaiwFXS9tYvBRzyFLlZg_f_NcgWZa4Q.ttf) format('truetype'); }
    @font-face { font-family: 'Hanken Grotesk'; font-style: normal; font-weight: 600; font-display: swap; src: url(https://fonts.gstatic.com/s/hankengrotesk/v12/ieVq2YZDLWuGJpnzaiwFXS9tYvBRzyFLlZg_f_NcbWFa4Q.ttf) format('truetype'); }
    @font-face { font-family: 'Hanken Grotesk'; font-style: normal; font-weight: 700; font-display: swap; src: url(https://fonts.gstatic.com/s/hankengrotesk/v12/ieVq2YZDLWuGJpnzaiwFXS9tYvBRzyFLlZg_f_NcVGFa4Q.ttf) format('truetype'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url(https://fonts.gstatic.com/s/jetbrainsmono/v24/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKxjPQ.ttf) format('truetype'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url(https://fonts.gstatic.com/s/jetbrainsmono/v24/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8-qxjPQ.ttf) format('truetype'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 700; font-display: swap; src: url(https://fonts.gstatic.com/s/jetbrainsmono/v24/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8L6tjPQ.ttf) format('truetype'); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0" rel="stylesheet">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear Cuenta - DofusDB</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="icon" href="images/favicon.png" type="image/png">

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {"on-secondary":"#412d02","surface-container-highest":"#353534","tertiary-fixed-dim":"#bdcbac","background":"#0A0A0A","on-tertiary-fixed-variant":"#3e4b32","on-surface-variant":"#d1c5b4","error":"#ffb4ab","surface-bright":"#393939","surface-variant":"#353534","secondary-fixed":"#ffdea9","error-container":"#93000a","primary-fixed":"#ffdea5","on-tertiary-container":"#333f27","tertiary":"#bdcbac","secondary-fixed-dim":"#e4c289","on-background":"#e5e2e1","primary-container":"#c5a059","on-primary-container":"#4e3700","secondary-container":"#5d4518","on-error-container":"#ffdad6","inverse-surface":"#e5e2e1","on-secondary-fixed":"#271900","surface-container":"#201f1f","primary-fixed-dim":"#e9c176","on-surface":"#e5e2e1","tertiary-container":"#9caa8c","surface":"#121212","on-tertiary-fixed":"#141f0a","on-secondary-container":"#d5b47c","on-primary":"#412d00","surface-tint":"#e9c176","on-error":"#690005","inverse-on-surface":"#313030","on-tertiary":"#28341d","surface-container-low":"#1c1b1b","on-primary-fixed-variant":"#5d4201","primary":"#e9c176","outline":"#9a8f80","secondary":"#e4c289","outline-variant":"#4e4639","surface-container-high":"#2a2a2a","surface-dim":"#131313","on-primary-fixed":"#261900","surface-container-lowest":"#0e0e0e","on-secondary-fixed-variant":"#5a4316","inverse-primary":"#775a19","tertiary-fixed":"#d9e8c6"},
          borderRadius: { DEFAULT: "2px", lg: "4px", xl: "8px", full: "12px" },
          spacing: { gutter: "20px", "margin-desktop": "40px", "margin-mobile": "16px", xs: "4px", xl: "80px", lg: "48px", base: "8px", md: "24px", sm: "12px" },
          fontFamily: {"titular-xl":["Cinzel"],"titular-lg":["Cinzel"],"titular-md":["Cinzel"],"cuerpo-lg":["Hanken Grotesk"],"cuerpo-md":["Hanken Grotesk"],"etiqueta-sm":["Hanken Grotesk"],"dato-num":["Hanken Grotesk"]},
          fontSize: {"titular-xl":["48px",{lineHeight:"1.2",letterSpacing:"0.05em",fontWeight:"700"}],"titular-lg":["32px",{lineHeight:"1.3",fontWeight:"600"}],"titular-md":["24px",{lineHeight:"1.4",fontWeight:"600"}],"cuerpo-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],"cuerpo-md":["16px",{lineHeight:"1.6",fontWeight:"400"}],"etiqueta-sm":["14px",{lineHeight:"1.2",fontWeight:"600"}],"dato-num":["14px",{lineHeight:"1",fontWeight:"700"}]}
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="font-cuerpo-md text-on-surface flex items-center justify-center min-h-screen p-margin-mobile overflow-hidden" style="background-image: url('images/fondooficion.JPG'); background-size: cover; background-position: center; background-attachment: fixed;">
  <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-0 pointer-events-none"></div>
  <!-- Particles -->
  <div class="fixed inset-0 pointer-events-none" id="particle-container"></div>

  <main class="relative z-10 w-full max-w-[440px]">
    <!-- Brand Identity -->
    <div class="text-center mb-8">
      <h1 class="font-titular-xl text-titular-xl text-primary drop-shadow-[0_0_10px_rgba(233,193,118,0.3)] tracking-widest uppercase">
        DofusDB
      </h1>
      <p class="font-etiqueta-sm text-etiqueta-sm text-primary-fixed-dim/60 tracking-[0.2em] uppercase mt-2">
        Forja tu identidad
      </p>
    </div>

    <!-- Register Card -->
    <div class="glass-panel rounded-xl overflow-hidden transition-all duration-300">
      <div class="p-6">
        <form id="registerForm" class="space-y-5">
          <div class="space-y-2">
            <label class="font-etiqueta-sm text-etiqueta-sm text-on-surface-variant block ml-1 uppercase tracking-tighter">Correo Electrónico</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">email</span>
              <input type="email" id="email" class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/50 focus:border-primary px-10 py-3 text-on-surface placeholder:text-on-surface-variant/30 rounded-t-lg transition-all focus:outline-none font-cuerpo-md" placeholder="aventurero@ejemplo.com" required>
            </div>
          </div>
          <div class="space-y-2">
            <label class="font-etiqueta-sm text-etiqueta-sm text-on-surface-variant block ml-1 uppercase tracking-tighter">Nombre de Usuario</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">badge</span>
              <input type="text" id="username" class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/50 focus:border-primary px-10 py-3 text-on-surface placeholder:text-on-surface-variant/30 rounded-t-lg transition-all focus:outline-none font-cuerpo-md" placeholder="Ej: MaestroForjador" required>
            </div>
          </div>
          <div class="space-y-2">
            <label class="font-etiqueta-sm text-etiqueta-sm text-on-surface-variant block ml-1 uppercase tracking-tighter">Contraseña</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">key</span>
              <input type="password" id="password" class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/50 focus:border-primary px-10 py-3 text-on-surface placeholder:text-on-surface-variant/30 rounded-t-lg transition-all focus:outline-none font-cuerpo-md" placeholder="Mínimo 8 caracteres" required>
            </div>
          </div>
          <div class="space-y-2">
            <label class="font-etiqueta-sm text-etiqueta-sm text-on-surface-variant block ml-1 uppercase tracking-tighter">Confirmar Contraseña</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">lock</span>
              <input type="password" id="confirmPassword" class="w-full bg-surface-container-lowest border-b-2 border-outline-variant/50 focus:border-primary px-10 py-3 text-on-surface placeholder:text-on-surface-variant/30 rounded-t-lg transition-all focus:outline-none font-cuerpo-md" placeholder="Repite tu clave" required>
            </div>
          </div>

          <p class="font-etiqueta-sm text-etiqueta-sm text-on-surface-variant/60 italic px-1">Al forjar esta cuenta, aceptás nuestros <a href="terminos.html" class="text-primary hover:underline transition-all">términos de servicio</a>.</p>

          <button type="submit" id="btnRegister" class="w-full bg-primary py-4 px-6 rounded-lg text-on-primary font-bold font-etiqueta-sm text-etiqueta-sm uppercase tracking-widest btn-glow transition-all active:scale-95 flex items-center justify-center gap-2 group">
            <span>Forjar mi Identidad</span>
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">bolt</span>
          </button>
        </form>

        <pre id="resultado" class="font-etiqueta-sm text-etiqueta-sm text-center mt-4"></pre>
      </div>

      <div class="bg-surface-container-low/50 py-4 px-6 border-t border-outline-variant/10 text-center">
        <a href="login.html" class="font-etiqueta-sm text-etiqueta-sm text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-1">
          <span class="material-symbols-outlined text-[16px]">arrow_back</span>
          ¿Ya tenés cuenta? Iniciá sesión
        </a>
      </div>
    </div>
  </main>

  <script>
    // Particle system
    const container = document.getElementById('particle-container');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.opacity = Math.random() * 0.3;
      container.appendChild(p);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/register.js"></script>
</body>
</html>
