<style>
        body {
            background-color: #0F0F10;
            overflow-x: hidden;
        }
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
            mix-blend-mode: overlay;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(28, 27, 28, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(233, 193, 118, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .metallic-trim {
            border: 1px solid;
            border-image-source: linear-gradient(135deg, rgba(233, 193, 118, 0.5) 0%, rgba(233, 193, 118, 0.1) 50%, rgba(233, 193, 118, 0.5) 100%);
            border-image-slice: 1;
        }
        .enchanted-glow {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        }
        .active-glow:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: scale(1.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .particle {
            position: absolute;
            background: #e9c176;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
            animation: float 8s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(20px); }

<script>
        // Particle system for magical effect
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.animationDelay = `${Math.random() * 8}s`;
            particle.style.animationDuration = `${Math.random() * 10 + 5}s`;
            container.appendChild(particle);
        }

        // Countdown Logic
        let timeLeft = 60;
        const countdownEl = document.getElementById('countdown');
        const resendBtn = document.getElementById('resendBtn');
        const btnText = document.getElementById('btnText');
        const btnProgress = document.getElementById('btnProgress');

        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            btnProgress.style.width = `${(timeLeft / 60) * 100}%`;

            if (timeLeft <= 0) {
                clearInterval(timer);
                resendBtn.disabled = false;
                resendBtn.classList.add('active-glow', 'hover:bg-primary/5');
                btnText.innerHTML = `
                    <span class="material-symbols-outlined">send</span>
                    Reenviar Pergamino Ahora
                `;
                btnProgress.style.display = 'none';
            }
        }, 1000);

        // Interaction
        resendBtn.addEventListener('click', () => {
            if (!resendBtn.disabled) {
                resendBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    resendBtn.style.transform = 'scale(1)';
                    alert('Un nuevo código de invocación ha sido enviado.');
                }, 150);
            }
        });
    </script>
