<!DOCTYPE html>

<html class="dark" lang="es"><head><style>
        body {
            background-color: #0F0F10;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(28, 27, 28, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(233, 193, 118, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .metallic-border {
            border-bottom: 1px solid transparent;
            border-image: linear-gradient(to right, transparent, #e9c176, transparent) 1;
        }

        .input-glow:focus {
            box-shadow: inset 0 0 10px rgba(233, 193, 118, 0.1);
            outline: none;
            border-color: #e9c176;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(233, 193, 118, 0.4);
            transform: translateY(-1px);
        }

        .active-tab {
            color: #e9c176;
            border-bottom: 2px solid #e9c176;
        }

        /* Ambient particles simulation */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #e9c176;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: float-up 10s infinite linear;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>

<script>
        function toggleAuth(type) {
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');

            if (type === 'login') {
                loginTab.classList.add('active-tab', 'text-primary');
                loginTab.classList.remove('text-on-surface-variant');
                registerTab.classList.remove('active-tab', 'text-primary');
                registerTab.classList.add('text-on-surface-variant');
                
                loginForm.classList.remove('hidden');
                loginForm.classList.add('block');
                registerForm.classList.add('hidden');
                registerForm.classList.remove('block');
            } else {
                registerTab.classList.add('active-tab', 'text-primary');
                registerTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('active-tab', 'text-primary');
                loginTab.classList.add('text-on-surface-variant');

                registerForm.classList.remove('hidden');
                registerForm.classList.add('block');
                loginForm.classList.add('hidden');
                loginForm.classList.remove('block');
            }
        }

        // Particle generation for atmosphere
        const container = document.getElementById('particles-container');
        const particleCount = 20;

        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.opacity = Math.random() * 0.3;
            container.appendChild(p);
        }

        // Intercept form submission for visual feedback
        document.querySelectorAll('form').forEach(form => {
            form.onsubmit = (e) => {
                e.preventDefault();
                const btn = form.querySelector('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
                btn.disabled = true;
                
                setTimeout(() => {
                    btn.innerHTML = '¡Acceso Concedido!';
                    btn.classList.replace('bg-primary', 'bg-tertiary-container');
                    btn.classList.replace('text-on-primary', 'text-on-tertiary-container');
                }, 1500);
            };
        });
    </script>
